<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electric Bill Calculator</title>
<style>
* {margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif;}
body {background:#FFF8E1; padding:20px; display:flex; justify-content:center;}
.card {
  background:white; 
  border-radius:16px; 
  padding:25px; 
  max-width:400px; 
  width:100%;
  box-shadow:0 4px 15px rgba(0,0,0,0.1);
  border-top:5px solid #D32F2F;
}
h2 {color:#D32F2F; margin-bottom:20px; text-align:center;}
label {display:block; margin-top:15px; font-weight:600; font-size:14px; color:#333;}
input, select {
  width:100%; 
  padding:12px; 
  margin-top:5px; 
  border:2px solid #FFE0B2; 
  border-radius:10px;
  font-size:15px;
}
button {
  width:100%; 
  padding:14px; 
  margin-top:20px; 
  background:linear-gradient(135deg, #D32F2F, #B71C1C); 
  color:white; 
  border:none; 
  border-radius:10px; 
  font-weight:700; 
  font-size:16px;
  cursor:pointer;
}
.result {
  margin-top:20px; 
  padding:15px; 
  background:#FFF8E1; 
  border-radius:10px; 
  border-left:4px solid #D32F2F;
  display:none;
}
.result h3 {color:#D32F2F; margin-bottom:10px;}
.result p {margin:5px 0; font-size:14px;}
.quick-btn {
  display:flex; 
  gap:8px; 
  margin-top:8px; 
  flex-wrap:wrap;
}
.quick-btn button {
  flex:1; 
  padding:8px; 
  font-size:12px; 
  margin-top:0;
  background:#FFE0B2; 
  color:#D32F2F;
}
</style>
</head>
<body>

<div class="card">
  <h2>⚡ Electric Bill Calculator</h2>
  
  <label>Appliance Type</label>
  <select id="type" onchange="setWatts()">
    <option value="custom">Custom/Manual</option>
    <option value="chest2">Chest Freezer 2-Door</option>
    <option value="chest3">Chest Freezer 3-Door</option>
    <option value="ac3hp">Aircon 3HP Standing</option>
  </select>
  
  <div class="quick-btn">
    <button type="button" onclick="setQuickWatts(200)">2-Door 200W</button>
    <button type="button" onclick="setQuickWatts(350)">3-Door 350W</button>
    <button type="button" onclick="setQuickWatts(2500)">3HP AC 2500W</button>
  </div>
  
  <label>Watts ng Appliance</label>
  <input type="number" id="watts" value="350" placeholder="Ex: 350">
  
  <label>Ilan piraso?</label>
  <input type="number" id="qty" value="10" min="1">
  
  <label>Ilan oras per day?</label>
  <input type="number" id="hours" value="24" min="1" max="24">
  
  <label>Ilan araw sa 1 buwan?</label>
  <input type="number" id="days" value="30" min="1" max="31">
  
  <label>Rate ni Meralco per kWh</label>
  <input type="number" id="rate" value="12.5" step="0.01">
  
  <button onclick="compute()">Compute Bill 💰</button>
  
  <div class="result" id="result">
    <h3>Result:</h3>
    <p id="kwh"></p>
    <p id="daily"></p>
    <p id="monthly"></p>
    <p style="font-size:12px; color:#666; margin-top:10px;">*Note: Assumption na tuloy-tuloy takbo. Actual mas mababa pag nag-o-off compressor</p>
  </div>
</div>

<script>
function setQuickWatts(w) {
  document.getElementById('watts').value = w;
}

function setWatts() {
  const type = document.getElementById('type').value;
  if(type === 'chest2') document.getElementById('watts').value = 220;
  if(type === 'chest3') document.getElementById('watts').value = 320;
  if(type === 'ac3hp') document.getElementById('watts').value = 2500;
}

function compute() {
  const watts = parseFloat(document.getElementById('watts').value);
  const qty = parseInt(document.getElementById('qty').value);
  const hours = parseFloat(document.getElementById('hours').value);
  const days = parseInt(document.getElementById('days').value);
  const rate = parseFloat(document.getElementById('rate').value);
  
  const kwhPerMonth = watts * qty * hours * days / 1000;
  const monthlyBill = kwhPerMonth * rate;
  const dailyBill = monthlyBill / days;
  
  document.getElementById('kwh').innerHTML = `<b>Total kWh/month:</b> ${kwhPerMonth.toLocaleString()} kWh`;
  document.getElementById('daily').innerHTML = `<b>Per day:</b> ₱${dailyBill.toLocaleString(undefined, {maximumFractionDigits:2})}`;
  document.getElementById('monthly').innerHTML = `<b>Per month:</b> ₱${monthlyBill.toLocaleString(undefined, {maximumFractionDigits:2})}`;
  document.getElementById('result').style.display = 'block';
}
</script>

</body>
</html>
